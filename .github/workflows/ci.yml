name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev tooling
        run: python -m pip install --upgrade pip pytest ruff mypy
      - name: Ruff
        run: ruff check scripts tests
      - name: Mypy
        run: mypy scripts/figma_pat
      - name: Pytest
        run: pytest -q
